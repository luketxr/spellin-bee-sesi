<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sorteador - SESI Spelling Bee</title>
    <style>
        /* CONFIGURAÇÃO DO FUNDO DO JOGO */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px;
            /* Aqui chamamos a sua imagem de fundo */
            background-image: url('fundo.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* CAIXA BRANCA CENTRAL (CONTAINER) */
        .container { 
            max-width: 500px; 
            width: 100%;
            padding: 30px; 
            /* Fundo branco com leve transparência para mostrar o fundo colorido atrás */
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
        }

        /* LOGO DO EVENTO */
        .logo {
            max-width: 220px;
            width: 100%;
            height: auto;
            margin-bottom: 10px;
        }

        textarea { 
            width: 100%; 
            height: 120px; 
            margin-bottom: 15px; 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid #ddd; 
            font-size: 15px; 
            box-sizing: border-box; 
            resize: none;
        }
        
        textarea:focus {
            border-color: #015bb4; /* Azul SESI */
            outline: none;
        }

        /* BOTÕES */
        button { 
            padding: 14px 24px; 
            font-size: 16px; 
            margin: 8px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: transform 0.1s, background-color 0.2s; 
        }

        button:active {
            transform: scale(0.97);
        }

        /* CORES DOS BOTÕES (Personalizáveis) */
        .btn-start { 
            background-color: #015bb4; /* Azul SESI */
            color: white; 
            width: 80%;
        }
        .btn-start:hover { background-color: #004487; }

        .btn-correct { 
            background-color: #28a745; /* Verde Sucesso */
            color: white; 
        }
        .btn-correct:hover { background-color: #1e7e34; }

        .btn-wrong { 
            background-color: #dc3545; /* Vermelho Erro */
            color: white; 
        }
        .btn-wrong:hover { background-color: #bd2130; }

        .btn-reset { 
            background-color: #6c757d; 
            color: white; 
            font-size: 12px; 
            padding: 8px 16px; 
            margin-top: 25px;
        }

        /* EXIBIÇÃO DA PALAVRA SORTEADA */
        .word-display { 
            font-size: 42px; 
            font-weight: 800; 
            margin: 25px 0; 
            min-height: 60px; 
            color: #015bb4; /* Azul SESI */
            text-shadow: 1px 1px 0px rgba(0,0,0,0.05);
            word-wrap: break-word;
        }

        p { font-size: 16px; color: #444; line-height: 1.4; }
        strong { color: #111; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="SESI Spelling Bee" class="logo">
        
        <div id="setup-area">
            <p>Cole suas palavras para o torneio abaixo<br>(uma por linha):</p>
            <textarea id="word-list" placeholder="Abelha&#10;Mel&#10;Colmeia"></textarea>
            <br>
            <button class="btn-start" onclick="startGame()">Iniciar Torneio</button>
        </div>
        
        <div id="game-area" style="display: none;">
            <p>Palavras restantes no "saco": <strong><span id="count">0</span></strong></p>
            <div class="word-display" id="current-word">-</div>
            <button class="btn-correct" onclick="handleResult(true)">Acertou! ✅</button>
            <button class="btn-wrong" onclick="handleResult(false)">Errou... ❌</button>
            <br>
            <button class="btn-reset" onclick="resetGame()">Nova Lista de Palavras</button>
        </div>
    </div>

    <script>
        let words = [];
        let currentWord = '';
        let currentIndex = -1;

        function startGame() {
            const text = document.getElementById('word-list').value;
            words = text.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            if (words.length === 0) {
                alert('Por favor, digite ou cole algumas palavras primeiro!');
                return;
            }
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            drawWord();
        }

        function drawWord() {
            if (words.length === 0) {
                document.getElementById('current-word').innerText = 'Fim das palavras! 🏆';
                document.getElementById('count').innerText = '0';
                return;
            }
            document.getElementById('count').innerText = words.length;
            currentIndex = Math.floor(Math.random() * words.length);
            currentWord = words[currentIndex];
            document.getElementById('current-word').innerText = currentWord;
        }

        function handleResult(correct) {
            if (words.length === 0) return;
            if (correct) {
                words.splice(currentIndex, 1); // Remove do sorteio
            }
            drawWord(); // Sorteia a próxima
        }

        function resetGame() {
            document.getElementById('setup-area').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('word-list').value = '';
        }
    </script>
</body>
</html>
