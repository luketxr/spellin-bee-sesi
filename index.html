        /* MAIN CONTAINER */
        .container { 
            max-width: 500px; 
            width: 100%;
            padding: 30px; 
            background: rgba(255, 255, 255, 0.96); 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.25); 
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-sizing: border-box;
        }

        /* LOGO */
        .logo {
            max-width: 220px;
            width: 100%;
            height: auto;
            margin-bottom: 10px;
        }

        textarea { 
            width: 100%; 
            height: 140px; 
            margin-bottom: 15px; 
            padding: 12px; 
            border-radius: 8px; 
            border: 2px solid #ddd; 
            font-size: 15px; 
            box-sizing: border-box; 
            resize: none;
        }
        
        textarea:focus {
            border-color: #015bb4; 
            outline: none;
        }

        /* SCOREBOARD */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            border: 1px solid #eaeaea;
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: bold;
        }
        .score-correct { color: #2ecc71; }
        .score-incorrect { color: #e74c3c; }

        /* BUTTONS STYLING */
        button { 
            padding: 14px 28px; 
            font-size: 16px; 
            margin: 8px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.1s, background-color 0.2s, box-shadow 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }

        /* VIBRANT COLORS FOR BUTTONS */
        .btn-start { 
            background-color: #015bb4; /* SESI Blue */
            color: white; 
            width: 85%;
        }
        .btn-start:hover { background-color: #004487; }

        .btn-correct { 
            background-color: #2ecc71; /* Vibrant Green */
            color: white; 
        }
        .btn-correct:hover { background-color: #27ae60; }

        .btn-wrong { 
            background-color: #e74c3c; /* Vibrant Red */
            color: white; 
        }
        .btn-wrong:hover { background-color: #c0392b; }

        .btn-reset { 
            background-color: #f39c12; /* Vibrant Orange */
            color: white; 
            font-size: 12px; 
            padding: 8px 16px; 
            margin-top: 25px;
            text-transform: none;
        }

        <!-- SETUP SCREEN -->
        <div id="setup-area">
            <p>Paste your spelling words below<br>(one per line):</p>
            <textarea id="word-list" placeholder="Honeybee&#10;Spelling&#10;Challenge"></textarea>
            <br>
            <button class="btn-start" onclick="startGame()">Start Tournament</button>
        </div>
        
        <!-- GAME SCREEN -->
        <div id="game-area" style="display: none;">
            <p>Remaining words in pool: <strong><span id="count">0</span></strong></p>
            
            <!-- Dynamic Scoreboard -->
            <div class="scoreboard">
                <span class="score-correct">Correct: <span id="correct-count">0</span></span>
                <span style="color: #ccc;">|</span>
                <span class="score-incorrect">Incorrect: <span id="wrong-count">0</span></span>
            </div>

            <div class="word-display" id="current-word">-</div>
            
            <button class="btn-correct" onclick="handleResult(true)">Correct! ✅</button>
            <button class="btn-wrong" onclick="handleResult(false)">Incorrect... ❌</button>
            <br>
            <button class="btn-reset" onclick="resetGame()">New Word List</button>
        </div>
    </div>

    <script>
        let words = [];
        let currentWord = '';
        let currentIndex = -1;
        let correctCount = 0;
        let wrongCount = 0;

        function startGame() {
            const text = document.getElementById('word-list').value;
            words = text.split('\n').map(w => w.trim()).filter(w => w.length > 0);
            if (words.length === 0) {
                alert('Please enter or paste some words first!');
                return;
            }
            // Reset scores
            correctCount = 0;
            wrongCount = 0;
            document.getElementById('correct-count').innerText = correctCount;
            document.getElementById('wrong-count').innerText = wrongCount;

            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            drawWord();
        }

        function drawWord() {
            if (words.length === 0) {
                document.getElementById('current-word').innerText = 'Finished! 🏆';
                document.getElementById('count').innerText = '0';
                return;
            }
            document.getElementById('count').innerText = words.length;
            currentIndex = Math.floor(Math.random() * words.length);
            currentWord = words[currentIndex];
            document.getElementById('current-word').innerText = currentWord;
        }

        function handleResult(correct) {
            if (words.length === 0) return;
            
            // Updates score board
            if (correct) {
                correctCount++;
                document.getElementById('correct-count').innerText = correctCount;
            } else {
                wrongCount++;
                document.getElementById('wrong-count').innerText = wrongCount;
            }

            // ALWAYS removes the word from the list, whether correct or incorrect
            words.splice(currentIndex, 1); 
            
            // Draw the next word
            drawWord(); 
        }

        function resetGame() {
            document.getElementById('setup-area').style.display = 'block';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('word-list').value = '';
        }
    </script>
